services:
  - type: web
    name: neuromeet-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && cd neuromeet && python manage.py collectstatic --no-input
    preDeployCommand: cd neuromeet && python manage.py migrate --no-input
    startCommand: cd neuromeet && daphne -b 0.0.0.0 -p $PORT neuromeet.asgi:application
    healthCheckPath: /
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ENABLE_HTTPS
        value: true
      - key: USE_WHITENOISE
        value: true
      - key: SERVE_MEDIA
        value: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: neuromeet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: neuromeet-redis
          property: connectionString

  - type: keyvalue
    name: neuromeet-redis
    plan: free
    region: oregon
    ipAllowList: []

databases:
  - name: neuromeet-db
    plan: free
    region: oregon
    databaseName: neuromeet
    user: neuromeet
    ipAllowList: []
